name: Bug
description: Report a defect
title: "[BUG] <Module>: <summary>"
labels: ["type:bug", "status:triage"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happens
      description: Actual vs expected
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [P0-critical, P1-high, P2-medium, P3-low]
    validations:
      required: true
