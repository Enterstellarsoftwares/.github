name: Feature / Task
description: New work item
title: "[FEAT] <Module>: <summary>"
labels: ["type:feature", "status:triage"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What and why
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [P0-critical, P1-high, P2-medium, P3-low]
    validations:
      required: true
